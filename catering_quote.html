function autoQty(id,g,h){

    plates:Math.ceil(guests*1.1),bowl_lg:Math.ceil(guests*1.1),bowl_md:Math.ceil(guests*0.7),

    chafing:hot,sterno:hot*4,hot_unit:Math.ceil(guests/120),induction:1,
    gn:hot,heat_lamp:Math.ceil(guests/120),troglar:Math.ceil(guests/60),
    carving:Math.ceil(guests/120),buf_table:guests<=250?1:2,
    linens:guests<=120?2:guests<=250?3:5,utensils:hot+4,decor:1,viking:1,
    chairs:guests,chair_covers:guests,
    guest_tables:Math.ceil(guests/8),extra_tables:Math.ceil(guests/40),
    tablecloths:Math.ceil(guests/8),
    amb_lighting:1,candles:Math.ceil(guests/4),candle_hold:Math.ceil(guests/4),
    thermo:Math.ceil(guests/250),pre_wash:Math.max(1,Math.ceil(guests/150)),
    post_wash:Math.max(2,Math.ceil(guests/75)),clean_sup:1,
  };
  return map[id]!==undefined?map[id]:1;
}
function initEquip(g,h){return EQUIP_DEF.map(e=>({...e,qty:autoQty(e.id,g,h)}));}

// ── Overtime helpers ──────────────────────────────────────────
function getEaster(Y){const a=Y%19,b=Math.floor(Y/100),c=Y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;return new Date(Y,mo-1,dy);}
function getHolidays(year){const e=getEaster(year),add=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;},s=d=>d.toISOString().slice(0,10);const aug1=new Date(year,7,1),commerce=new Date(year,7,1+((8-aug1.getDay())%7||7)),apr19=new Date(year,3,19),summer=new Date(year,3,19+((4-apr19.getDay()+7)%7||7));return new Set([`${year}-01-01`,s(add(e,-3)),s(add(e,-2)),s(e),s(add(e,1)),s(summer),`${year}-05-01`,s(add(e,39)),s(add(e,49)),s(add(e,50)),`${year}-06-17`,s(commerce),`${year}-12-24`,`${year}-12-25`,`${year}-12-26`,`${year}-12-31`]);}
function detectDayType(ds,st){if(!ds)return{type:"manual",mult:1.45,label:"No date — manual rate",color:"#9ca3af"};const date=new Date(ds+"T12:00:00"),year=date.getFullYear(),dow=date.getDay();if(getHolidays(year).has(ds))return{type:"holiday",mult:1.9,label:"🎄 Public holiday ×1.9",color:"#dc2626"};if(dow===0||dow===6)return{type:"weekend",mult:1.45,label:"📅 Weekend ×1.45",color:"#d97706"};const[h,m]=(st||"09:00").split(":").map(Number);if(h*60+(m||0)>=17*60)return{type:"evening",mult:1.33,label:"🌆 Weekday evening ×1.33",color:"#7c3aed"};return{type:"daytime",mult:1.0,label:"☀️ Weekday daytime ×1.0",color:"#15803d"};}
function splitHours(lh,st){const[h,m]=(st||"09:00").split(":").map(Number),startMins=h*60+(m||0),dayHrs=Math.max(0,Math.min(lh,(17*60-startMins)/60));return{dayHrs,eveHrs:Math.max(0,lh-dayHrs)};}

// ── Equipment Section ─────────────────────────────────────────
function EquipSection({equipment,setEquipment,onRefresh,customItems,setCustomItems}){
  const stdTotal=equipment.filter(e=>e.on).reduce((s,e)=>s+e.cost*e.qty,0);
  const custTotal=customItems.reduce((s,e)=>s+(e.cost||0)*(e.qty||1),0);
  const total=stdTotal+custTotal;
  const upd=(id,field,val)=>setEquipment(p=>p.map(e=>e.id===id?{...e,[field]:val}:e));
  const addCustom=()=>setCustomItems(p=>[...p,{id:`c_${Date.now()}`,name:"",qty:1,cost:0}]);
  const updCustom=(id,field,val)=>setCustomItems(p=>p.map(e=>e.id===id?{...e,[field]:val}:e));
  const delCustom=(id)=>setCustomItems(p=>p.filter(e=>e.id!==id));
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:11,color:"#6b7280"}}>Unit costs = depreciation + wash per use.</div>
        <button onClick={onRefresh} style={{fontSize:11,padding:"5px 10px",border:"1px solid #e5e7eb",borderRadius:7,background:"white",cursor:"pointer",fontWeight:600}}>↻ Auto-refresh quantities</button>
      </div>
      {/* Column headers */}
      <div style={{display:"grid",gridTemplateColumns:"20px 1fr 55px 55px 90px",gap:5,marginBottom:6,paddingBottom:6,borderBottom:"1px solid #e5e7eb"}}>
        <div/>
        <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.04em"}}>Item</div>
        <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.04em",textAlign:"center"}}>Qty</div>
        <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.04em",textAlign:"center"}}>Price/unit</div>
        <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.04em",textAlign:"right"}}>Total</div>
      </div>
      {EQUIP_CATS.map(cat=>{
        const items=equipment.filter(e=>e.cat===cat);
        const catTotal=items.filter(e=>e.on).reduce((s,e)=>s+e.cost*e.qty,0);
        return(
          <div key={cat} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <div style={{fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.05em"}}>{cat}</div>
              <div style={{fontSize:11,fontWeight:700,color:"#374151"}}>{catTotal>0?fmt(catTotal):"—"}</div>
            </div>
            {items.map(item=>(
              <div key={item.id} style={{display:"grid",gridTemplateColumns:"20px 1fr 55px 55px 90px",gap:5,alignItems:"center",marginBottom:4,opacity:item.on?1:0.4}}>
                <input type="checkbox" checked={item.on} onChange={e=>upd(item.id,"on",e.target.checked)} style={{width:15,height:15,accentColor:"#e11d48",cursor:"pointer"}}/>
                <span style={{fontSize:12,color:item.on?"#111":"#9ca3af"}}>{item.name}</span>
                <input type="number" value={item.qty} onChange={e=>upd(item.id,"qty",Math.max(0,Number(e.target.value)))} disabled={!item.on} style={{...I,textAlign:"center",padding:"4px 6px",fontSize:12}}/>
                <input type="number" value={item.cost} onChange={e=>upd(item.id,"cost",Math.max(0,Number(e.target.value)))} disabled={!item.on} style={{...I,padding:"4px 6px",fontSize:12}}/>
                <div style={{textAlign:"right",fontSize:12,fontWeight:600,color:item.on?"#374151":"#9ca3af"}}>{item.on&&item.cost>0?fmt(item.cost*item.qty):"—"}</div>
              </div>
            ))}
          </div>
        );
      })}

      {/* Custom items */}
      <div style={{marginBottom:12,borderTop:"1px dashed #e5e7eb",paddingTop:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.05em"}}>Custom items</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {custTotal>0&&<div style={{fontSize:11,fontWeight:700,color:"#374151"}}>{fmt(custTotal)}</div>}
            <button onClick={addCustom} style={{fontSize:11,padding:"4px 10px",border:"1px solid #0284c7",borderRadius:7,background:"#e0f2fe",color:"#0369a1",cursor:"pointer",fontWeight:700}}>+ Add item</button>
          </div>
        </div>
        {customItems.length===0&&(
          <div style={{fontSize:12,color:"#9ca3af",fontStyle:"italic",padding:"6px 0"}}>No custom items — click "+ Add item" to add anything not on the list above.</div>
        )}
        {customItems.map(item=>(
          <div key={item.id} style={{display:"grid",gridTemplateColumns:"1fr 55px 70px 90px 28px",gap:5,alignItems:"center",marginBottom:6}}>
            <input type="text" placeholder="Item description" value={item.name} onChange={e=>updCustom(item.id,"name",e.target.value)} style={{...I,padding:"4px 8px",fontSize:12}}/>
            <input type="number" min={1} value={item.qty} onChange={e=>updCustom(item.id,"qty",Math.max(1,Number(e.target.value)))} style={{...I,textAlign:"center",padding:"4px 6px",fontSize:12}}/>
            <input type="number" min={0} placeholder="Cost" value={item.cost} onChange={e=>updCustom(item.id,"cost",Math.max(0,Number(e.target.value)))} style={{...I,padding:"4px 6px",fontSize:12}}/>
            <div style={{textAlign:"right",fontSize:12,fontWeight:600,color:"#374151"}}>{fmt((item.cost||0)*(item.qty||1))}</div>
            <button onClick={()=>delCustom(item.id)} style={{padding:"4px",border:"1px solid #fca5a5",borderRadius:6,background:"#fef2f2",color:"#dc2626",cursor:"pointer",fontSize:13,lineHeight:1}}>✕</button>
          </div>
        ))}
      </div>

      <div style={{borderTop:"2px solid #111",paddingTop:8,display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:14}}>
        <span>Equipment total</span><span>{fmt(total)}</span>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("standard");
  // Standard
  const [client,setClient]=useState({name:"",email:"",phone:"",company:""});
  const [evDate,setEvDate]=useState(""); const [evType,setEvType]=useState(EVENT_TYPES[0]);
  const [notes,setNotes]=useState(""); const [guests,setGuests]=useState(25);
  const [menuId,setMenuId]=useState("bistro"); const [svcId,setSvcId]=useState("pickup");
  const [coop,setCoop]=useState(false); const [qid,setQid]=useState(genId);
  const [stdAdj,setStdAdj]=useState(0);
  // Custom
  const [C,setC]=useState(defaultCustom);
  const [cc,setCc]=useState({name:"",email:"",phone:"",company:""});
  const [cDate,setCDate]=useState(""); const [cNotes,setCNotes]=useState(""); const [cQid,setCQid]=useState(genId);
  const [equipment,setEquipment]=useState(()=>initEquip(defaultCustom.guests,defaultCustom.hotDishes));
  const [customItems,setCustomItems]=useState([]);
  // Shared
  const [quotes,setQuotes]=useState([]); const [templates,setTemplates]=useState([]);
  const [modal,setModal]=useState(null); const [tplName,setTplName]=useState("");
  const [status,setStatus]=useState(null); const [printContent,setPrintContent]=useState(null);
  const [policy,setPolicy]=useState(POLICY_DEFAULTS);
  const [deposit,setDeposit]=useState(DEPOSIT_DEFAULTS);
  const [notice,setNotice]=useState(NOTICE_DEFAULTS);
  const [cancel,setCancel]=useState(CANCEL_DEFAULTS);
  const printRef=useRef();

  const depositText=`${deposit.p1}% deposit required to confirm (${deposit.p1label}). ${deposit.p2}% due ${deposit.p2weeks} weeks before event. Remaining ${deposit.p3}% invoiced after event.`;
  const noticeText=`Minimum notice: ${notice.smallHours} hours for ${notice.smallPax} or fewer guests. ${notice.largeDays} days for larger events.`;
  const cancelText=`Cancellation: within ${notice.smallHours} hours — ${cancel.immediate}. ${cancel.midDaysFrom}–${cancel.midDaysTo} days before — ${cancel.mid}% charge. ${cancel.free}+ days before — free.`;
  const activePolicies=policy.map(p=>{
    if(!p.on) return null;
    let text=p.text;
    if(p.id==="deposit") text=depositText;
    if(p.id==="notice")  text=noticeText;
    if(p.id==="cancel")  text=cancelText;
    return {...p,text};
  }).filter(Boolean);
  const loadAll=useCallback(async()=>{
    try{const qr=await window.storage.list("cq:");const qs=[];if(qr&&qr.keys&&qr.keys.length)for(const k of qr.keys){try{const x=await window.storage.get(k);if(x)qs.push(JSON.parse(x.value));}catch{}}setQuotes(qs.sort((a,b)=>b.ts-a.ts));}catch{}
    try{const tr=await window.storage.list("tpl:");const ts=[];if(tr&&tr.keys&&tr.keys.length)for(const k of tr.keys){try{const x=await window.storage.get(k);if(x)ts.push(JSON.parse(x.value));}catch{}}setTemplates(ts.sort((a,b)=>b.savedAt-a.savedAt));}catch{}
  },[]);

  // ── Standard calc ─────────────────────────────────────────
  const menu=MENUS.find(m=>m.id===menuId),svc=SERVICES.find(s=>s.id===svcId),tier=TIERS.find(t=>guests>=t.min);
  const gDisc=tier.rate,cDisc=coop?COOP_DISC:0,ppp=Math.round(menu.price*(1-gDisc)*(1-cDisc));
  const fSub=ppp*guests,bSub=svc.bar?BAR_PP*guests:0,vFee=svc.venue?VENUE_BASE:0,del=svc.delivery;
  const credit=svc.staff?Math.round((fSub+bSub)*CREDIT_RATE):0;
  const exVAT=fSub+bSub+vFee+del-(svc.venue?credit:0);
  const stdTotal=Math.round((exVAT+Math.round(fSub*VAT_FOOD)+Math.round(bSub*VAT_BAR))*(1+stdAdj/100));
  const savedAmt=(menu.price*guests)-fSub;

  // ── Custom calc ───────────────────────────────────────────
  const upd=(k,v)=>setC(p=>({...p,[k]:v})),updN=(k)=>(e)=>upd(k,parseFloat(e.target.value)||0);
  const prepRate=C.baseRate*SALARY_COSTS;
  const dayType=detectDayType(cDate,C.eventStartTime);
  const fieldMult=C.autoOvertime?dayType.mult:C.overtimeMult;
  const fieldRate=C.baseRate*fieldMult*SALARY_COSTS;
  const{dayHrs,eveHrs}=dayType.type==="daytime"?splitHours(C.locationHours,C.eventStartTime):{dayHrs:0,eveHrs:C.locationHours};
  const locCost=dayType.type==="daytime"?(dayHrs*C.locationStaff*prepRate+eveHrs*C.locationStaff*C.baseRate*1.33*SALARY_COSTS):(C.locationHours*C.locationStaff*fieldRate);
  const prepCost=C.prepStaff*C.prepHours*prepRate;
  const travCost=C.travelStaff*C.travelHours*fieldRate;
  const planCost=C.planningHours*C.planningRate*SALARY_COSTS;
  const labourTotal=prepCost+locCost+travCost+planCost;
  const ingCost=C.guests*C.ingredientPP;
  const vehicleCostPerKm=(C.fuelPricePerL*(C.fuelConsumptionPer100/100))+KM_TAX+C.vehicleOverheadPerKm;
  const kmCost=C.vehicles*C.kmOneWay*2*vehicleCostPerKm;
  const transCost=C.deliveryZone==="selfoss"?(C.guests<30?2990:0):((C.deliveryBaseFee||0)+kmCost);
  const suggestedTravelHrs=C.kmOneWay>0?round5((C.kmOneWay*2)/C.avgSpeedKmh):0;
  const travelLinked=suggestedTravelHrs>0&&Math.abs(C.travelHours-suggestedTravelHrs)<0.3;
  const consCost=C.guests*C.consumablesPP;
  const equipTotal=equipment.filter(e=>e.on).reduce((s,e)=>s+e.cost*e.qty,0)
    +customItems.reduce((s,e)=>s+(e.cost||0)*(e.qty||1),0);
  const isBundle=C.transportVATMode==="bundle11";
  // When transport is separate (24% VAT), exclude it from the margin/overhead engine
  // — transport is a pass-through at cost. Only catering costs get margin'd up.
  const cateringDirectCost=ingCost+labourTotal+(isBundle?transCost:0)+equipTotal+consCost+C.extraCostsFlat;
  const contingencyAmt=cateringDirectCost*(C.contingencyPct/100);
  const totalCost=cateringDirectCost+contingencyAmt+(isBundle?0:transCost); // for margin display
  const combinedDeduct=C.targetMarginPct/100+C.overheadPct/100;
  const cateringRevNeeded=combinedDeduct<1?( cateringDirectCost+contingencyAmt)/(1-combinedDeduct):(cateringDirectCost+contingencyAmt)*2;
  const revNeeded=cateringRevNeeded+(isBundle?0:transCost); // total revenue needed incl. transport pass-through
  const overheadContribution=Math.round(cateringRevNeeded*(C.overheadPct/100));
  const monthlyFixed=C.monthlyRent+C.monthlyElectricity+C.monthlySubscriptions+C.monthlyInsurance+C.monthlyAccounting+C.monthlyOther;
  const perEventFixed=C.eventsPerMonth>0?Math.round(monthlyFixed/C.eventsPerMonth):0;
  const ppExVAT=C.guests>0?revNeeded/C.guests:0;
  const foodRevenue=cateringRevNeeded; // catering subtotal ex. VAT (transport excluded when separate)
  const foodVAT=Math.round(foodRevenue*(C.vatRate/100));
  const transVAT=isBundle?0:Math.round(transCost*0.24);
  const totalVAT=foodVAT+transVAT;
  const totalInclVAT=revNeeded+totalVAT;
  const ppInclVAT=C.guests>0?totalInclVAT/C.guests:0;
  const actualMargin=(cateringRevNeeded-(cateringDirectCost+contingencyAmt))/cateringRevNeeded;

  function applyPreset(p){
    setC(prev=>({...defaultCustom,...prev,...p.cfg}));
    setEquipment(initEquip(p.cfg.guests||50,p.cfg.hotDishes||5));
    setCQid(genId());
  }
  function refreshEquipQty(){setEquipment(prev=>prev.map(e=>({...e,qty:autoQty(e.id,C.guests,C.hotDishes)})));}

  async function handleSave(isCustom){
    setStatus("saving");
    const id=isCustom?cQid:qid;
    const q=isCustom
      ?{id,ts:Date.now(),type:"custom",client:cc,evDate:cDate,notes:cNotes,eventName:C.eventName,guests:C.guests,totalCost,totalInclVAT,ppInclVAT,ppExVAT,custom:C,equipment,customItems}
      :{id,ts:Date.now(),type:"standard",client,evDate,evType,notes,guests,menuId,svcId,coop,total:stdTotal,menuName:menu.name};
    try{
      await window.storage.set(`cq:${id}`,JSON.stringify(q));
      try{await fetch("https://api.emailjs.com/api/v1.0/email/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({service_id:EMAILJS.serviceId,template_id:EMAILJS.templateId,user_id:EMAILJS.publicKey,template_params:{quote_id:id,client_name:(isCustom?cc.name:client.name)||"–",event_date:(isCustom?cDate:evDate)||"–",guests:isCustom?C.guests:guests,total:fmt(isCustom?totalInclVAT:stdTotal),event_name:isCustom?C.eventName:menu.name}})});}catch{}
      await loadAll();setStatus("saved");
    }catch{setStatus("error");}
    setTimeout(()=>setStatus(null),3000);
  }
  async function saveTemplate(){
    const name=tplName.trim()||C.eventName;
    const tpl={id:`tpl_${Date.now()}`,savedAt:Date.now(),name,config:C,equipment};
    await window.storage.set(`tpl:${tpl.id}`,JSON.stringify(tpl));
    await loadAll();setModal(null);setTplName("");
  }
  async function deleteTemplate(id){try{await window.storage.delete(`tpl:${id}`);await loadAll();}catch{}}
  async function deleteQuote(id){try{await window.storage.delete(`cq:${id}`);await loadAll();}catch{}}
  function loadQuote(q){
    if(q.type==="custom"){setCc(q.client||{name:"",email:"",phone:"",company:""});setCDate(q.evDate||"");setCNotes(q.notes||"");if(q.custom)setC(q.custom);if(q.equipment)setEquipment(q.equipment);if(q.customItems)setCustomItems(q.customItems);setCQid(q.id);setTab("custom");}
    else{setClient(q.client||{name:"",email:"",phone:"",company:""});setEvDate(q.evDate||"");setEvType(q.evType||EVENT_TYPES[0]);setNotes(q.notes||"");setGuests(q.guests||10);setMenuId(q.menuId||"bistro");setSvcId(q.svcId||"pickup");setCoop(q.coop||false);setQid(q.id);setTab("standard");}
    setModal(null);
  }
  function loadTemplate(tpl){setC({...defaultCustom,...tpl.config});if(tpl.equipment)setEquipment(tpl.equipment);setTab("custom");setModal(null);setCQid(genId());}

    if(isCustom&&reviewMode){costBlock=`<h3 style="font-size:13px;margin:20px 0 8px;border-top:1px solid #e5e7eb;padding-top:16px">Cost Breakdown (internal)</h3>

      <tr style="background:#f0fdf4"><td colspan="2" style="padding:6px 8px;font-weight:700;border:1px solid #e5e7eb">Total cost → margin (${C.targetMarginPct}% target / ${pct(actualMargin)} actual)</td><td style="padding:6px 8px;text-align:right;font-weight:700;border:1px solid #e5e7eb">${fmt(totalCost)} → +${fmt(revNeeded-totalCost)}</td></tr>

    </div>`;}
    const feedbackBlock=reviewMode?`<div style="margin-top:28px;border-top:2px dashed #ca8a04;padding-top:16px"><h3 style="font-size:13px;color:#78350f;margin-bottom:10px">✏️ Review Feedback</h3><table style="width:100%;font-size:12px;border-collapse:collapse">${["Ingredient cost accurate?","Labour hours realistic?","Equipment list complete?","Margin acceptable?","Pricing competitive?","Other comments"].map(q=>`<tr><td style="padding:8px 10px;border:1px solid #e5e7eb;width:40%">${q}</td><td style="padding:8px 10px;border:1px solid #e5e7eb">&nbsp;</td></tr>`).join("")}</table><p style="font-size:11px;color:#9ca3af;margin-top:8px">Reviewed by: ___________________ &nbsp;&nbsp; Date: ___________________</p></div>`:"";
    let rows=isCustom?`
      <tr><td><strong>${C.eventName}</strong> — ${C.guests} guests</td><td></td></tr>

      ${isBundle?"":`<tr><td style="color:#6b7280;padding-left:12px">Transport (${C.vehicles} vehicle${C.vehicles>1?"s":""}, ${C.kmOneWay*2}km)</td><td style="text-align:right;color:#6b7280">${fmt(transCost)}</td></tr>`}
      <tr><td style="color:#6b7280;padding-left:12px">Equipment & consumables</td><td style="text-align:right;color:#6b7280">${fmt(equipTotal+consCost)}</td></tr>
      ${C.extraCostsFlat>0?`<tr><td style="color:#6b7280;padding-left:12px">${C.extraCostsLabel}</td><td style="text-align:right;color:#6b7280">${fmt(C.extraCostsFlat)}</td></tr>`:""}
      <tr class="sub"><td>Catering subtotal ex. VAT</td><td style="text-align:right">${fmt(isBundle?revNeeded:foodRevenue)}</td></tr>
      <tr class="sub"><td>VAT ${C.vatRate}%</td><td style="text-align:right">${fmt(isBundle?Math.round(revNeeded*(C.vatRate/100)):foodVAT)}</td></tr>

    `:`

  function openPrint(isCustom,rm){setPrintContent({html:buildHTML(isCustom,rm),reviewMode:rm});setTimeout(()=>window.scrollTo(0,0),0);}

              <div style={{borderBottom:"1px solid #f3f4f6",paddingBottom:10,marginBottom:10,fontSize:12}}>
                <div style={{fontWeight:600}}>{client.name||"Client"}</div>
                {client.company&&<div style={{fontSize:11,color:"#6b7280"}}>{client.company}</div>}
                {client.email&&<div style={{fontSize:11,color:"#6b7280"}}>{client.email}</div>}

              {/* Travel — linked to km */}
              <div className="g2c" style={{display:"grid",gridTemplateColumns:"1fr 1fr 80px 100px",gap:6,marginBottom:2,alignItems:"end"}}>
                <F label={`Travel hrs${suggestedTravelHrs>0?` (${C.kmOneWay*2}km ÷ ${C.avgSpeedKmh}km/h = ${suggestedTravelHrs}h suggested)`:""}`}>
                  <div style={{position:"relative"}}>
                    <input type="number" step={0.5} value={C.travelHours} onChange={updN("travelHours")} style={I}/>
                    {suggestedTravelHrs>0&&!travelLinked&&<div style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",fontSize:10,color:"#e11d48",cursor:"pointer",fontWeight:700}} onClick={()=>upd("travelHours",suggestedTravelHrs)} title="Sync to km">↻{suggestedTravelHrs}h</div>}
                    {travelLinked&&<div style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",fontSize:10,color:"#15803d"}}>🔗</div>}
                  </div>
                </F>
                <F label="Staff"><input type="number" value={C.travelStaff} onChange={updN("travelStaff")} style={I}/></F>
                <F label="Staff-hrs"><Ro val={(C.travelHours*C.travelStaff).toFixed(1)+"h"}/></F>
                <F label="Cost"><Ro val={fmt(travCost)} bold/></F>
              </div>
              <div style={{marginBottom:8}}>
                <F label="Avg. speed for travel estimate (km/h)"><input type="number" value={C.avgSpeedKmh} onChange={updN("avgSpeedKmh")} style={{...I,width:100}}/></F>
              </div>
              {/* Planning */}
              <div style={{borderTop:"1px solid #f3f4f6",paddingTop:10}}>
                <div style={{fontSize:11,fontWeight:700,color:"#92400e",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:5}}>⚠️ Planning & Manager Overhead</div>
                <div className="g2c" style={{display:"grid",gridTemplateColumns:"1fr 1fr 100px",gap:6,alignItems:"end"}}>
                  <F label="Planning hours"><input type="number" step={0.5} value={C.planningHours} onChange={updN("planningHours")} style={I}/></F>
                  <F label="Manager rate (kr/hr)"><input type="number" value={C.planningRate} onChange={updN("planningRate")} style={I}/></F>
                  <F label="Cost"><Ro val={fmt(planCost)} bold/></F>
                </div>
              </div>
              <div style={{textAlign:"right",fontWeight:700,fontSize:13,marginTop:8}}>Total labour: {fmt(labourTotal)}</div>
            </Card>

            <Card title="🚗 Transport">
              {/* Zone */}
              <div style={{display:"flex",gap:6,marginBottom:12}}>
                {[["selfoss","📍 In Selfoss"],["outside","🗺️ Outside Selfoss"]].map(([v,lbl])=>(
                  <button key={v} onClick={()=>upd("deliveryZone",v)} style={{flex:1,padding:"8px",border:`1.5px solid ${C.deliveryZone===v?"#e11d48":"#e5e7eb"}`,borderRadius:8,background:C.deliveryZone===v?"#fff1f2":"white",color:C.deliveryZone===v?"#be123c":"#6b7280",fontWeight:600,fontSize:13,cursor:"pointer"}}>{lbl}</button>
                ))}
              </div>
              {/* VAT mode */}
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>VAT treatment</div>
                <div style={{display:"flex",gap:6}}>
                  {[["separate24","🧾 Separate line (24%)","For corporate/B2B clients who reclaim VAT"],["bundle11","📦 Bundle into catering (11%)","For private clients — lower total price"]].map(([v,lbl,tip])=>(
                    <button key={v} onClick={()=>upd("transportVATMode",v)} title={tip}
                      style={{flex:1,padding:"8px 10px",border:`1.5px solid ${C.transportVATMode===v?"#e11d48":"#e5e7eb"}`,borderRadius:8,background:C.transportVATMode===v?"#fff1f2":"white",color:C.transportVATMode===v?"#be123c":"#6b7280",fontWeight:600,fontSize:11,cursor:"pointer",lineHeight:1.3}}>
                      {lbl}<div style={{fontSize:10,fontWeight:400,color:C.transportVATMode===v?"#9f1239":"#9ca3af",marginTop:2}}>{tip}</div>
                    </button>
                  ))}
                </div>
              </div>
              {C.deliveryZone==="selfoss"?(
                <div style={{background:C.guests>=30?"#f0fdf4":"#fef9c3",border:`1px solid ${C.guests>=30?"#bbf7d0":"#fcd34d"}`,borderRadius:8,padding:"12px 14px",fontSize:13}}>
                  {C.guests>=30?<div style={{color:"#15803d",fontWeight:700}}>✓ Free delivery — {C.guests} guests (30+ pax in Selfoss)</div>
                    :<div style={{color:"#92400e",fontWeight:700}}>2.990 kr flat — under 30 pax in Selfoss</div>}
                </div>
              ):(
                <>
                  <div className="g2c" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                    <F label="Distance one way (km)"><input type="number" value={C.kmOneWay} onChange={e=>{const v=parseFloat(e.target.value)||0;upd("kmOneWay",v);if(travelLinked)upd("travelHours",round5((v*2)/C.avgSpeedKmh));}} style={I}/></F>
                    <F label="Vehicles"><input type="number" value={C.vehicles} onChange={updN("vehicles")} style={I}/></F>
                  </div>
                  <div style={{background:"#f9fafb",borderRadius:8,padding:"10px 12px",marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Cost per km breakdown</div>
                    <div className="g2c" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      <F label="Fuel price per liter (kr)"><input type="number" value={C.fuelPricePerL} onChange={updN("fuelPricePerL")} style={I}/></F>
                      <F label="Consumption (L/100km)"><input type="number" step={0.5} value={C.fuelConsumptionPer100} onChange={updN("fuelConsumptionPer100")} style={I}/></F>
                      <F label="Vehicle overhead (kr/km)"><input type="number" value={C.vehicleOverheadPerKm} onChange={updN("vehicleOverheadPerKm")} style={I}/></F>
                      <F label="Kílómetragjald (fixed by law)"><Ro val={`${KM_TAX} kr/km (vans ≤3.5t)`}/></F>
                    </div>
                    <div style={{fontSize:10,color:"#9ca3af",marginTop:6}}>💡 Vehicle overhead: tyres, oil, brakes, insurance amortized per km. Typically 15–25 kr/km for a van.</div>
                    <div style={{marginTop:8,display:"flex",justifyContent:"space-between",fontSize:12,borderTop:"1px solid #e5e7eb",paddingTop:8}}>
                      <span style={{color:"#6b7280"}}>Fuel {fmt(Math.round(C.fuelPricePerL*(C.fuelConsumptionPer100/100)))} + tax {fmt(Math.round(KM_TAX))} + overhead {fmt(C.vehicleOverheadPerKm)} =</span>
                      <strong>{fmt(Math.round(vehicleCostPerKm))}/km per vehicle</strong>
                    </div>
                  </div>
                  <div className="g2c" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                    <F label="Base fee (kr, optional — 0 for km-only)"><input type="number" value={C.deliveryBaseFee} onChange={updN("deliveryBaseFee")} style={I}/></F>
                    <F label="Total transport cost"><Ro val={fmt(transCost)} bold/></F>
                  </div>
                  <div style={{fontSize:11,color:"#9ca3af"}}>
                    {C.vehicles} vehicle{C.vehicles>1?"s":""} × {C.kmOneWay*2}km × {fmt(Math.round(vehicleCostPerKm))}/km = {fmt(Math.round(kmCost))}{(C.deliveryBaseFee||0)>0?` + ${fmt(C.deliveryBaseFee)} base fee`:""} · Fuel ref: <a href="https://gasvaktin.is" target="_blank" style={{color:"#e11d48"}}>gasvaktin.is</a> (~215 kr/L May 2026)
                  </div>
                </>
              )}
            </Card>

            <Card title="🪑 Equipment & Setup">
              <div className="g2c" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                <F label="Hot dishes on menu (auto-calc chafing/fuel)"><input type="number" value={C.hotDishes} onChange={updN("hotDishes")} style={I}/></F>
                <F label="Consumables per person (kr)"><input type="number" value={C.consumablesPP} onChange={updN("consumablesPP")} style={I}/></F>
                <F label="Extra cost label"><input value={C.extraCostsLabel} onChange={e=>upd("extraCostsLabel",e.target.value)} style={I}/></F>
                <F label="Extra cost flat (kr)"><input type="number" value={C.extraCostsFlat} onChange={updN("extraCostsFlat")} style={I}/></F>
              </div>
              <EquipSection equipment={equipment} setEquipment={setEquipment} onRefresh={refreshEquipQty} customItems={customItems} setCustomItems={setCustomItems}/>
              <SetupNotes guests={C.guests} hotDishes={C.hotDishes}/>
            </Card>

            <Card title="🏢 Fixed Overhead & Margin">
              <div style={{fontSize:12,color:"#374151",marginBottom:12,padding:"8px 12px",background:"#f0f9ff",borderRadius:8,lineHeight:1.6}}>
                Overhead covers rent, electricity, subscriptions, insurance and accounting — charged as a <strong>% of revenue</strong> so small parties pay less and large parties pay their fair share automatically.
              </div>
              <div style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{fontWeight:700,fontSize:12}}>Overhead %</div>
                  <div style={{fontSize:16,fontWeight:700,color:"#0369a1"}}>{C.overheadPct}%</div>
                </div>
                <input type="range" min={0} max={25} step={1} value={C.overheadPct} onChange={e=>upd("overheadPct",Number(e.target.value))} style={{width:"100%",accentColor:"#0369a1"}}/>
                <div style={{display:"flex",gap:4,marginTop:6}}>
                  {[5,8,10,12,15].map(v=>(
                    <button key={v} onClick={()=>upd("overheadPct",v)} style={{flex:1,padding:"4px 0",fontSize:11,fontWeight:600,border:`1px solid ${C.overheadPct===v?"#0369a1":"#e5e7eb"}`,borderRadius:6,background:C.overheadPct===v?"#e0f2fe":"white",color:C.overheadPct===v?"#0369a1":"#6b7280",cursor:"pointer"}}>{v}%</button>
                  ))}
                </div>
                <div style={{marginTop:8,fontSize:11,color:"#6b7280",lineHeight:1.7}}>
                  At this quote: <strong style={{color:"#0369a1"}}>{fmt(overheadContribution)}</strong> overhead contribution → <strong style={{color:"#0369a1"}}>{fmt(Math.round(overheadContribution/Math.max(C.guests,1)))}/pax</strong><br/>
                  <span style={{color:"#9ca3af"}}>Typical range: 8–12% for a catering operation where the restaurant also shares fixed costs. Use 12–18% if catering must cover all fixed costs alone.</span>
                </div>
              </div>
              <div style={{borderTop:"1px solid #e5e7eb",paddingTop:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{fontWeight:700,fontSize:12}}>Profit Margin %</div>
                  <div style={{fontSize:16,fontWeight:700,color:C.targetMarginPct>=20?"#15803d":C.targetMarginPct>=15?"#d97706":"#dc2626"}}>{C.targetMarginPct}%</div>
                </div>
                <input type="range" min={5} max={50} value={C.targetMarginPct} onChange={e=>upd("targetMarginPct",Number(e.target.value))} style={{width:"100%",accentColor:"#e11d48"}}/>
                <div style={{display:"flex",gap:4,marginTop:6}}>
                  {[15,20,25,28,30].map(v=>(
                    <button key={v} onClick={()=>upd("targetMarginPct",v)} style={{flex:1,padding:"4px 0",fontSize:11,fontWeight:600,border:`1px solid ${C.targetMarginPct===v?"#e11d48":"#e5e7eb"}`,borderRadius:6,background:C.targetMarginPct===v?"#fff1f2":"white",color:C.targetMarginPct===v?"#be123c":"#6b7280",cursor:"pointer"}}>{v}%</button>
                  ))}
                </div>
                <div style={{marginTop:8,padding:"8px 10px",background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,fontSize:12,color:"#15803d"}}>
                  <strong>Revenue split: {C.targetMarginPct}% profit + {C.overheadPct}% overhead + {Math.round(100-C.targetMarginPct-C.overheadPct)}% direct costs</strong>
                  <div style={{fontSize:11,color:"#166534",marginTop:2}}>Actual margin: {pct(actualMargin)} · Overhead: {fmt(overheadContribution)} · Profit: {fmt(Math.round(revNeeded*C.targetMarginPct/100))}</div>
                </div>
              </div>
            </Card>

            <div style={{background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:10,padding:"12px 14px",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:"#5b21b6"}}>📚 Save as Menu Template</div><div style={{fontSize:11,color:"#7c3aed",marginTop:2}}>Stores all cost parameters + equipment list for instant reuse.</div></div>
              <button onClick={()=>{setTplName(C.eventName);setModal("saveTemplate");}} style={{background:"#7c3aed",color:"white",border:"none",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0}}>Save Template →</button>
            </div>
          </div>

          {/* Custom summary sidebar */}
          <div style={{position:"sticky",top:60,alignSelf:"start",display:"flex",flexDirection:"column",gap:10}}>
            <SHdr qid={cQid}/>
            <div style={{background:"white",borderRadius:10,border:"1px solid #e5e7eb",padding:"12px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{fontSize:12,fontWeight:700}}>🎯 Target Margin</div>
                <div style={{fontSize:18,fontWeight:700,color:C.targetMarginPct>=28?"#15803d":C.targetMarginPct>=22?"#d97706":"#dc2626"}}>{C.targetMarginPct}%</div>
              </div>
              <input type="range" min={5} max={50} value={C.targetMarginPct} onChange={e=>upd("targetMarginPct",Number(e.target.value))} style={{width:"100%",accentColor:"#e11d48"}}/>
              <div style={{display:"flex",gap:4,marginTop:6}}>
                {[20,25,28,30,35].map(v=><button key={v} onClick={()=>upd("targetMarginPct",v)} style={{flex:1,padding:"4px 0",fontSize:11,fontWeight:600,border:`1px solid ${C.targetMarginPct===v?"#e11d48":"#e5e7eb"}`,borderRadius:6,background:C.targetMarginPct===v?"#fff1f2":"white",color:C.targetMarginPct===v?"#be123c":"#6b7280",cursor:"pointer"}}>{v}%</button>)}
              </div>
            </div>
            <div style={{background:"white",borderRadius:10,border:"1px solid #e5e7eb",padding:"12px 14px"}}>
              <div style={{borderBottom:"1px solid #f3f4f6",paddingBottom:10,marginBottom:10,fontSize:12}}>
                <div style={{fontWeight:700,fontSize:14}}>{C.eventName}</div>
                <div style={{fontWeight:600,marginTop:2}}>{cc.name||"Client"}</div>
                {cc.company&&<div style={{fontSize:11,color:"#6b7280"}}>{cc.company}</div>}
                {cc.email&&<div style={{fontSize:11,color:"#6b7280"}}>{cc.email}</div>}
                <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{cDate||"Date TBD"} · {C.guests} guests</div>
              </div>
              <LR label="Ingredients" sub={`${fmt(C.ingredientPP)}/pax×${C.guests}`} val={fmt(ingCost)}/>
              <LR label="Labour (all)" val={fmt(labourTotal)}/>
              <LR label={C.transportVATMode==="separate24"?"Transport (24% VAT)":"Transport (bundled 11%)"} val={fmt(transCost)} muted={transCost===0}/>
              <LR label={`Equipment (${equipment.filter(e=>e.on).length} items)`} val={fmt(equipTotal)}/>
              <LR label="Consumables" val={fmt(consCost)}/>
              {C.extraCostsFlat>0&&<LR label={C.extraCostsLabel} val={fmt(C.extraCostsFlat)}/>}
              <LR label={`Fixed overhead (${C.eventsPerMonth} events/mo)`} val={fmt(perEventFixed)}/>
              <LR label={`Contingency (${C.contingencyPct}%)`} val={fmt(contingencyAmt)}/>
              <div style={{borderTop:"1px dashed #e5e7eb",margin:"8px 0 4px"}}/>
              <LR label="Total cost" val={fmt(totalCost)} muted/>
              <LR label={`Margin (${C.targetMarginPct}%)`} val={fmt(revNeeded-totalCost)} green/>
              <div style={{borderTop:"1px solid #f3f4f6",margin:"8px 0 4px"}}/>
              <LR label={`Food/service ex. VAT`} val={fmt(Math.round(foodRevenue))} muted/>
              <LR label={`Food VAT (${C.vatRate}%)`} val={fmt(foodVAT)} muted/>
              {C.transportVATMode==="separate24"&&transCost>0&&<>
                <LR label="Transport ex. VAT" val={fmt(transCost)} muted/>
                <LR label="Transport VAT (24%)" val={fmt(transVAT)} muted/>
              </>}
              <div style={{borderTop:"2px solid #111",marginTop:8,paddingTop:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:16,marginBottom:6}}><span>Total (incl. VAT)</span><span style={{color:"#be123c"}}>{fmt(totalInclVAT)}</span></div>
                <div style={{background:"#fef3c7",borderRadius:8,padding:"10px 12px"}}>
                  <div style={{fontSize:11,color:"#92400e",fontWeight:700}}>Recommended per person</div>
                  <div style={{fontSize:22,fontWeight:700,color:"#78350f"}}>{fmt(ppInclVAT)}</div>
                  <div style={{fontSize:12,color:"#92400e"}}>{fmt(ppExVAT)} ex. VAT</div>
                </div>
              </div>
            </div>
            <PC policy={policy} setPolicy={setPolicy} deposit={deposit} setDeposit={setDeposit} notice={notice} setNotice={setNotice} cancel={cancel} setCancel={setCancel} activePolicies={activePolicies}/>
          </div>
        </div>
      )}

      {/* PRINT OVERLAY */}
      {printContent&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)",zIndex:100,display:"flex",flexDirection:"column",minHeight:"100%"}}>
          <div style={{background:printContent.reviewMode?"#fef9c3":"#111827",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,position:"sticky",top:0,zIndex:101}}>
            <div style={{fontWeight:700,color:printContent.reviewMode?"#78350f":"white",fontSize:14}}>{printContent.reviewMode?"👁️ Review Draft — Internal":"🖨️ Client Quote Preview"}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={doPrint} style={{background:"#e11d48",color:"white",border:"none",borderRadius:8,padding:"8px 18px",fontWeight:700,fontSize:13,cursor:"pointer"}}>🖨️ Print / Save as PDF</button>
              <button onClick={()=>setPrintContent(null)} style={{background:"rgba(255,255,255,0.15)",color:printContent.reviewMode?"#78350f":"white",border:"none",borderRadius:8,padding:"8px 14px",fontWeight:600,fontSize:13,cursor:"pointer"}}>✕ Close</button>
            </div>
          </div>
          <div ref={printRef} style={{flex:1,background:"#e5e7eb",padding:20}}>
            <iframe srcDoc={printContent.html} sandbox="allow-same-origin allow-scripts allow-modals allow-popups" style={{width:"100%",maxWidth:760,height:900,margin:"0 auto",display:"block",border:"none",borderRadius:4,boxShadow:"0 4px 24px rgba(0,0,0,0.2)"}} title="Quote Preview"/>
          </div>
        </div>
      )}

      {/* MODALS */}
      {modal==="history"&&<Mdl title={`📜 Quote History (${quotes.length})`} onClose={()=>setModal(null)}>
        {quotes.length===0?<p style={{color:"#9ca3af",fontSize:13}}>No saved quotes yet.</p>:quotes.map(q=>(
          <div key={q.id} style={{display:"flex",gap:10,padding:"10px 12px",border:"1px solid #e5e7eb",borderRadius:9,marginBottom:6}}>
            <div style={{flex:1,cursor:"pointer"}} onClick={()=>loadQuote(q)}>
              <div style={{fontWeight:600,fontSize:13,display:"flex",gap:6,alignItems:"center"}}>{q.id}<span style={{fontSize:10,background:q.type==="custom"?"#e0e7ff":"#fce7f3",color:q.type==="custom"?"#3730a3":"#9d174d",padding:"1px 6px",borderRadius:4}}>{q.type==="custom"?"Custom":"Standard"}</span></div>
              <div style={{fontSize:11,color:"#6b7280"}}>{q.client?.name||"No client"} · {q.evDate||"No date"} · {q.guests} guests</div>
              <div style={{fontSize:10,color:"#9ca3af"}}>{q.eventName||q.menuName||""} · {dStr(q.ts)}</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0,display:"flex",flexDirection:"column",justifyContent:"space-between",alignItems:"flex-end"}}>
              <div style={{fontWeight:700,color:"#be123c",fontSize:13}}>{fmt(q.total||q.totalInclVAT||0)}</div>
              <div style={{display:"flex",gap:4}}>
                <button onClick={()=>loadQuote(q)} style={{fontSize:11,padding:"3px 8px",border:"1px solid #e5e7eb",borderRadius:6,cursor:"pointer",background:"white"}}>Load</button>
                <button onClick={()=>deleteQuote(q.id)} style={{fontSize:11,padding:"3px 8px",border:"1px solid #fecaca",borderRadius:6,cursor:"pointer",background:"white",color:"#ef4444"}}>✕</button>
              </div>
            </div>
          </div>
        ))}
      </Mdl>}
      {modal==="templates"&&<Mdl title={`📚 Menu Templates (${templates.length})`} onClose={()=>setModal(null)}>
        {templates.length===0?<p style={{color:"#9ca3af",fontSize:13}}>No templates yet.</p>:templates.map(t=>(
          <div key={t.id} style={{display:"flex",gap:10,padding:"10px 12px",border:"1px solid #ddd6fe",borderRadius:9,marginBottom:6,background:"#faf5ff"}}>
            <div style={{flex:1,cursor:"pointer"}} onClick={()=>loadTemplate(t)}>
              <div style={{fontWeight:700,fontSize:13,color:"#5b21b6"}}>{t.name}</div>
              <div style={{fontSize:11,color:"#7c3aed"}}>{t.config?.guests} pax · {fmt(t.config?.ingredientPP||0)}/pax · {t.config?.targetMarginPct}% margin</div>
              <div style={{fontSize:10,color:"#9ca3af"}}>Saved {dStr(t.savedAt)}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end",justifyContent:"center"}}>
              <button onClick={()=>loadTemplate(t)} style={{fontSize:11,padding:"4px 10px",border:"none",borderRadius:6,cursor:"pointer",background:"#7c3aed",color:"white",fontWeight:600}}>Load</button>
              <button onClick={()=>deleteTemplate(t.id)} style={{fontSize:11,padding:"3px 8px",border:"1px solid #fecaca",borderRadius:6,cursor:"pointer",background:"white",color:"#ef4444"}}>✕</button>
            </div>
          </div>
        ))}
        <button onClick={()=>setModal("saveTemplate")} style={{marginTop:8,width:"100%",padding:9,border:"1.5px dashed #c4b5fd",borderRadius:9,background:"none",cursor:"pointer",fontSize:13,color:"#7c3aed"}}>+ Save current as template</button>
      </Mdl>}
      {modal==="saveTemplate"&&<Mdl title="💾 Save Menu Template" onClose={()=>setModal(null)} small>
        <p style={{fontSize:13,color:"#374151",marginBottom:12}}>Name this template — saves all cost params and equipment list.</p>
        <F label="Template name"><input value={tplName} onChange={e=>setTplName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveTemplate()} placeholder={C.eventName} style={I} autoFocus/></F>
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button onClick={saveTemplate} style={{flex:1,padding:"9px",background:"#7c3aed",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:13}}>Save Template</button>
          <button onClick={()=>setModal(null)} style={{padding:"9px 14px",border:"1px solid #e5e7eb",borderRadius:8,cursor:"pointer",background:"white",fontSize:13}}>Cancel</button>
        </div>
      </Mdl>}
    </div>
  );
}

// ── Shared micro-components ───────────────────────────────────
const I={width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"7px 10px",fontSize:13,boxSizing:"border-box",outline:"none",fontFamily:"inherit"};
const Card=({title,children})=><div style={{background:"white",borderRadius:10,border:"1px solid #e5e7eb",padding:14}}><div style={{fontWeight:700,marginBottom:10}}>{title}</div>{children}</div>;
const F=({label,children,span2})=><div style={span2?{gridColumn:"1/-1"}:{}}><div style={{fontSize:10,fontWeight:700,color:"#6b7280",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</div>{children}</div>;
const Ro=({val,bold})=><div style={{...I,background:"#f9fafb",color:bold?"#374151":"#6b7280",fontWeight:bold?700:400,cursor:"default"}}>{val}</div>;
const SB=({onClick,children})=><button onClick={onClick} style={{width:28,height:28,borderRadius:7,border:"1px solid #e5e7eb",background:"white",cursor:"pointer",fontSize:15,fontWeight:700,flexShrink:0}}>{children}</button>;
const Rad=({sel})=><div style={{width:14,height:14,borderRadius:"50%",border:`2px solid ${sel?"#e11d48":"#d1d5db"}`,background:sel?"#e11d48":"white",marginTop:2,flexShrink:0}}/>;
const Tog=({val,set})=><div onClick={()=>set(!val)} style={{width:36,height:20,borderRadius:10,background:val?"#e11d48":"#d1d5db",position:"relative",cursor:"pointer",flexShrink:0}}><div style={{position:"absolute",top:2,width:16,height:16,background:"white",borderRadius:"50%",boxShadow:"0 1px 3px rgba(0,0,0,.2)",transform:val?"translateX(18px)":"translateX(2px)",transition:"transform 0.2s"}}/></div>;
const Bge=({n,color="#e11d48"})=><span style={{display:"inline-block",background:color,color:"white",borderRadius:20,fontSize:10,fontWeight:700,padding:"1px 6px",marginLeft:4}}>{n}</span>;
const LR=({label,sub,val,green,muted})=><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}><div><span style={{fontSize:12,color:green?"#059669":muted?"#9ca3af":"#374151"}}>{label}</span>{sub&&<div style={{fontSize:10,color:"#9ca3af"}}>{sub}</div>}</div><span style={{fontWeight:muted?400:500,color:green?"#059669":muted?"#9ca3af":"#111",marginLeft:8,fontSize:12,flexShrink:0}}>{val}</span></div>;
const SHdr=({qid})=><div style={{background:"#111827",color:"white",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontWeight:700,fontSize:14}}>Fröken Selfoss</div><div style={{fontSize:10,color:"#9ca3af"}}>Brúartorg · +354 451-3320</div></div><div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#9ca3af"}}>Quote</div><div style={{fontFamily:"monospace",fontSize:11,fontWeight:700}}>{qid}</div><div style={{fontSize:10,color:"#9ca3af"}}>{new Date().toLocaleDateString("en-GB")}</div></div></div>;
const PC=({policy,setPolicy,deposit,setDeposit,notice,setNotice,cancel,setCancel,activePolicies})=>{
  const [open,setOpen]=useState(false);
  const updDep=(k,v)=>setDeposit(p=>({...p,[k]:v}));
  const updNot=(k,v)=>setNotice(p=>({...p,[k]:v}));
  const updCan=(k,v)=>setCancel(p=>({...p,[k]:v}));
  const p1=deposit.p1||0,p2=deposit.p2||0,p3=Math.max(0,100-p1-p2);
  return(<div style={{background:"white",borderRadius:10,border:"1px solid #e5e7eb",padding:12}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:open?10:0}}>
      <div style={{fontWeight:700,fontSize:12}}>📋 Booking Policy</div>
      <button onClick={()=>setOpen(o=>!o)} style={{fontSize:11,padding:"3px 10px",border:"1px solid #e5e7eb",borderRadius:6,background:"white",cursor:"pointer",color:"#6b7280",fontWeight:600}}>{open?"Done":"Edit"}</button>
    </div>
    {open&&(<div style={{marginBottom:12}}>
      <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Show on quote</div>
      {policy.map((p,i)=>(<label key={p.id} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:6,cursor:"pointer"}}>
        <input type="checkbox" checked={p.on} onChange={e=>setPolicy(prev=>prev.map((x,j)=>j===i?{...x,on:e.target.checked}:x))} style={{marginTop:2,accentColor:"#e11d48"}}/>
        <span style={{fontSize:11,color:p.on?"#374151":"#9ca3af",lineHeight:1.5}}>{p.icon} {
          p.id==="deposit"?"Deposit terms (customizable below)":
          p.id==="notice"?"Notice requirement (customizable below)":
          p.id==="cancel"?"Cancellation policy (customizable below)":
          p.text
        }</span>
      </label>))}

      {/* Notice customizer */}
      {policy.find(p=>p.id==="notice"&&p.on)&&(<div style={{marginTop:8,background:"#f9fafb",borderRadius:8,padding:"10px 12px",border:"1px solid #e5e7eb",marginBottom:8}}>
        <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Notice requirement</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <input type="number" min={1} value={notice.smallHours} onChange={e=>updNot("smallHours",Number(e.target.value))} style={{...I,width:60,textAlign:"center",padding:"4px",fontSize:13,fontWeight:700}}/>
            <span style={{fontSize:11,color:"#374151"}}>hours min. for</span>
            <input type="number" min={1} value={notice.smallPax} onChange={e=>updNot("smallPax",Number(e.target.value))} style={{...I,width:60,textAlign:"center",padding:"4px",fontSize:13,fontWeight:700}}/>
            <span style={{fontSize:11,color:"#374151"}}>or fewer guests</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <input type="number" min={1} value={notice.largeDays} onChange={e=>updNot("largeDays",Number(e.target.value))} style={{...I,width:60,textAlign:"center",padding:"4px",fontSize:13,fontWeight:700}}/>
            <span style={{fontSize:11,color:"#374151"}}>days min. for larger events</span>
          </div>
          <div style={{fontSize:11,color:"#0369a1",background:"#e0f2fe",borderRadius:6,padding:"6px 10px"}}>
            Preview: Minimum {notice.smallHours} hours for {notice.smallPax} or fewer guests. {notice.largeDays} days for larger events.
          </div>
        </div>
      </div>)}

      {/* Cancellation customizer */}
      {policy.find(p=>p.id==="cancel"&&p.on)&&(<div style={{marginTop:0,background:"#f9fafb",borderRadius:8,padding:"10px 12px",border:"1px solid #e5e7eb",marginBottom:8}}>
        <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Cancellation policy</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:11,color:"#374151",minWidth:80}}>Within {notice.smallHours}h:</span>
            <input type="text" value={cancel.immediate} onChange={e=>updCan("immediate",e.target.value)} style={{...I,flex:1,padding:"4px 8px",fontSize:12}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <input type="number" min={1} value={cancel.midDaysFrom} onChange={e=>updCan("midDaysFrom",Number(e.target.value))} style={{...I,width:50,textAlign:"center",padding:"4px",fontSize:13,fontWeight:700}}/>
            <span style={{fontSize:11,color:"#374151"}}>–</span>
            <input type="number" min={1} value={cancel.midDaysTo} onChange={e=>updCan("midDaysTo",Number(e.target.value))} style={{...I,width:50,textAlign:"center",padding:"4px",fontSize:13,fontWeight:700}}/>
            <span style={{fontSize:11,color:"#374151"}}>days:</span>
            <input type="number" min={0} max={100} value={cancel.mid} onChange={e=>updCan("mid",Number(e.target.value))} style={{...I,width:55,textAlign:"center",padding:"4px",fontSize:13,fontWeight:700}}/>
            <span style={{fontSize:11,color:"#374151"}}>% charge</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <input type="number" min={1} value={cancel.free} onChange={e=>updCan("free",Number(e.target.value))} style={{...I,width:50,textAlign:"center",padding:"4px",fontSize:13,fontWeight:700}}/>
            <span style={{fontSize:11,color:"#374151"}}>+ days before: free</span>
          </div>
          <div style={{fontSize:11,color:"#0369a1",background:"#e0f2fe",borderRadius:6,padding:"6px 10px"}}>
            Preview: Within {notice.smallHours}h — {cancel.immediate}. {cancel.midDaysFrom}–{cancel.midDaysTo} days — {cancel.mid}% charge. {cancel.free}+ days — free.
          </div>
        </div>
      </div>)}

      {/* Deposit customizer */}
      {policy.find(p=>p.id==="deposit"&&p.on)&&(<div style={{marginTop:0,background:"#f9fafb",borderRadius:8,padding:"10px 12px",border:"1px solid #e5e7eb"}}>
        <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Deposit structure</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"grid",gridTemplateColumns:"60px 1fr",gap:8,alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <input type="number" min={0} max={100} value={p1} onChange={e=>updDep("p1",Math.min(100,Number(e.target.value)))} style={{...I,width:50,textAlign:"center",padding:"4px",fontSize:13,fontWeight:700}}/>
              <span style={{fontSize:12,color:"#6b7280"}}>%</span>
            </div>
            <div>
              <div style={{fontSize:11,color:"#374151",fontWeight:600}}>On confirmation</div>
              <input type="text" value={deposit.p1label} onChange={e=>updDep("p1label",e.target.value)} placeholder="e.g. non-refundable" style={{...I,marginTop:3,fontSize:11,padding:"4px 8px"}}/>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"60px 1fr",gap:8,alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <input type="number" min={0} max={100-p1} value={p2} onChange={e=>updDep("p2",Math.min(100-p1,Number(e.target.value)))} style={{...I,width:50,textAlign:"center",padding:"4px",fontSize:13,fontWeight:700}}/>
              <span style={{fontSize:12,color:"#6b7280"}}>%</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input type="number" min={1} max={52} value={deposit.p2weeks} onChange={e=>updDep("p2weeks",Number(e.target.value))} style={{...I,width:50,textAlign:"center",padding:"4px",fontSize:13,fontWeight:700}}/>
              <span style={{fontSize:11,color:"#374151"}}>weeks before event</span>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"60px 1fr",gap:8,alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:50,textAlign:"center",padding:"4px",fontSize:13,fontWeight:700,color:"#9ca3af",background:"#f3f4f6",borderRadius:8,border:"1px solid #e5e7eb"}}>{p3}</div>
              <span style={{fontSize:12,color:"#6b7280"}}>%</span>
            </div>
            <div style={{fontSize:11,color:"#6b7280"}}>Remaining — after event (auto-calculated)</div>
          </div>
          <div style={{fontSize:11,color:"#0369a1",background:"#e0f2fe",borderRadius:6,padding:"6px 10px"}}>
            Preview: {p1}% on confirmation ({deposit.p1label}) · {p2}% due {deposit.p2weeks} weeks before · {p3}% after event
          </div>
        </div>
      </div>)}
    </div>)}
    {activePolicies.map((p,i)=><div key={i} style={{display:"flex",gap:5,marginBottom:4,fontSize:11,color:"#4b5563",lineHeight:1.5}}><span style={{flexShrink:0}}>{p.icon}</span><span>{p.text}</span></div>)}
  </div>);
};
const Mdl=({title,children,onClose,small})=><div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}><div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:14,width:"100%",maxWidth:small?400:500,maxHeight:"82vh",overflow:"auto",padding:20}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div style={{fontWeight:700,fontSize:15}}>{title}</div><button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#9ca3af"}}>✕</button></div>{children}</div></div>;
const BS=(bg,border,color)=>({background:bg,border:`1px solid ${border}`,color,borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center"});
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
<script>
(function(){
  var last=0;
  function contentEl(){return document.getElementById("root")||document.body;}
  function measure(){var el=contentEl();return Math.ceil(el.getBoundingClientRect().height);}
  function post(){var h=measure();if(h>0&&Math.abs(h-last)>2){last=h;try{parent.postMessage({__vtFrameHeight:h},"*");}catch(e){}}}
  window.addEventListener("load",post);window.addEventListener("resize",post);
  if(window.ResizeObserver){new ResizeObserver(post).observe(contentEl());}
  setInterval(post,800);
})();
</script>
